version: "v1"
examples:
  - example_id: "01_text_basic"
    source_example_file: "01_text_basic.py"
    input_mode: "file"
    input_spec:
      file: "terms&defs.txt"
    pipeline_create_payload:
      name: "01_text_basic_pipeline"
      description: "Text loader + regex logical split + token chunks + dual-like indexing"
      loader:
        type: "TextLoader"
        params: {}
      inputs: []
      segmentation_stages:
        - stage_name: "logical_regex"
          splitter_type: "RegexSplitter"
          params:
            pattern: "(?=##Term:)"
            chunk_size: 4096
            chunk_overlap: 0
          input_aliases: ["LOADING"]
          position: 0
        - stage_name: "token_chunks"
          splitter_type: "TokenTextSplitter"
          params:
            chunk_size: 150
            chunk_overlap: 15
            model_name: "cl100k_base"
          input_aliases: ["logical_regex"]
          position: 1
      indexing:
        index_type: "chroma"
        params:
          embeddings_provider: "openai"
          cleanup: true
          collection_name: "01_text_basic"
          dual_storage: true
          doc_store_path: "./data/docstore/01_text_basic.pkl"
        collection_name: "01_text_basic"
        docstore_name: "01_text_basic_docstore"
    run_payload_template: {}
    retrieval_plan:
      retriever_type: "create_scored_dual_storage_retriever"
      retriever_params:
        id_key: "parent_id"
        search_kwargs:
          k: 8
      requires_session: false
      query: "Что такое CRM?"
      top_k: 5
      strict_match: true
    expected_outcome: "success"
    notes: "Simulates text basic dual-storage pattern."

