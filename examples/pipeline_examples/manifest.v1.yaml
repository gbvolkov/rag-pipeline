- example_id: 13_dual_storage
  source_example_file: 13_dual_storage.py
  input_mode: segments
  input_spec:
    segments:
    - segment_id: doc_rag
      content: Retrieval Augmented Generation (RAG) combines retrieval and generation. A retriever finds relevant external
        context and the generator uses that context to produce grounded responses with lower hallucination risk.
      metadata:
        title: RAG Definition
        topic: rag
      type: text
      original_format: text
      path:
      - dual_storage_demo.txt
      level: 0
    - segment_id: doc_indexing
      content: Dual storage keeps compact searchable chunks in a vector index while storing full parent documents in a document
        store. Retrieval finds chunk matches first and then hydrates the associated parent document.
      metadata:
        title: Dual Storage Indexing
        topic: indexing
      type: text
      original_format: text
      path:
      - dual_storage_demo.txt
      level: 0
  runs:
  - run_name: main
    pipeline_create_payload:
      name: 13_dual_storage_pipeline
      runtime_input:
        alias: PARENTS
        artifact_kind: segment
      inputs: []
      stages:
      - stage_name: token_chunks
        stage_kind: splitter
        component_type: TokenTextSplitter
        params:
          chunk_size: 35
          chunk_overlap: 8
          model_name: cl100k_base
        input_aliases:
        - PARENTS
        position: 0
      indexing:
        index_type: chroma
        params:
