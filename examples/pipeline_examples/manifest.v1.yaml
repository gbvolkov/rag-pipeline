version: v2
examples:
- example_id: 01_text_basic
  source_example_file: 01_text_basic.py
  input_mode: file
  input_spec:
    file: terms&defs.txt
  runs:
  - run_name: main
    pipeline_create_payload:
      name: 01_text_basic_pipeline
      loader:
        type: TextLoader
        params: {}
      inputs: []
      stages:
      - stage_name: logical_regex
        stage_kind: splitter
        component_type: RegexSplitter
        params:
          pattern: (?=##Term:)
        input_aliases:
        - LOADING
        position: 0
      - stage_name: token_chunks
        stage_kind: splitter
        component_type: TokenTextSplitter
        params:
          chunk_size: 150
          chunk_overlap: 15
          model_name: cl100k_base
        input_aliases:
        - logical_regex
        position: 1
      indexing:
        index_type: chroma
        params:
          embeddings: &id002
            object_type: create_embeddings_model
            provider: openai
            model_name: text-embedding-3-small
          cleanup: true
          collection_name: 01_text_basic
          dual_storage: true
          doc_store_path: ./data/docstore/01_text_basic.pkl
        collection_name: 01_text_basic
        docstore_name: 01_text_basic_docstore
    run_payload_template: {}
    retrievals:
    - name: dual
      source:
        kind: index
      create:
        retriever_type: create_scored_dual_storage_retriever
        params:
          id_key: parent_id
          search_kwargs:
            k: 10
          search_type: similarity_score_threshold
          score_threshold: 0.5
      requires_session: false
      queries:
      - name: what_is_1c_crm
        query: Что такое 1C  CRM?
        top_k: 10
        strict_match: true
  expected_outcome: success
  notes: Pipeline-only API example parity with rag-lib.
- example_id: 02_markdown_enrichment
  source_example_file: 02_markdown_enrichment.py
  input_mode: file
  input_spec:
    file: quotes.toscrape.com_index.md
  runs:
  - run_name: main
    pipeline_create_payload:
      name: 02_markdown_enrichment_pipeline
      loader:
        type: TextLoader
        params: {}
      inputs: []
      stages:
      - stage_name: md_recursive
        stage_kind: splitter
        component_type: RecursiveCharacterTextSplitter
        params:
          chunk_size: 1000
          chunk_overlap: 100
        input_aliases:
        - LOADING
        position: 0
      - stage_name: enriched
        stage_kind: processor
        component_type: SegmentEnricher
        params:
          llm: &id001
            object_type: create_llm
            provider: openai
            model_name: gpt-4.1-nano
            temperature: 0
            streaming: false
        input_aliases:
        - md_recursive
        position: 1
    run_payload_template: {}
    retrievals:
    - name: fuzzy
      source:
        kind: stage
        stage_name: enriched
      create:
        retriever_type: FuzzyRetriever
        params:
          threshold: 45
          mode: wratio
      requires_session: false
      queries:
      - name: einstein
        query: einstein
        top_k: 5
        strict_match: true
  expected_outcome: success
  notes: Pipeline-only API example parity with rag-lib.
- example_id: 02_markdown_enrichment_vector
  source_example_file: 02_markdown_enrichment_vector.py
  input_mode: file
  input_spec:
    file: quotes.toscrape.com_index.md
  runs:
  - run_name: main
    pipeline_create_payload:
      name: 02_markdown_enrichment_vector_pipeline
      loader:
        type: TextLoader
        params: {}
      inputs: []
      stages:
      - stage_name: md_recursive
        stage_kind: splitter
        component_type: RecursiveCharacterTextSplitter
        params:
          chunk_size: 1000
          chunk_overlap: 100
        input_aliases:
        - LOADING
        position: 0
      - stage_name: enriched
        stage_kind: processor
        component_type: SegmentEnricher
        params:
          llm: *id001
        input_aliases:
        - md_recursive
        position: 1
      indexing:
        index_type: faiss
        params:
          embeddings: *id002
          collection_name: 02_markdown_enrichment_vector
        collection_name: 02_markdown_enrichment_vector
    run_payload_template: {}
    retrievals:
    - name: vector
      source:
        kind: index
      create:
        retriever_type: create_vector_retriever
        params:
          top_k: 2
      requires_session: false
      queries:
      - name: einstein_quotes
        query: einstein quotes
        top_k: 2
        strict_match: true
  expected_outcome: success
  notes: Pipeline-only API example parity with rag-lib.
- example_id: 03_pdf_semantic
  source_example_file: 03_pdf_semantic.py
  input_mode: file
  input_spec:
    file: 2025_soo_frp_russkij-yazyk_10_11-2.pdf
  runs:
  - run_name: main
    pipeline_create_payload:
      name: 03_pdf_semantic_pipeline
      loader:
        type: PyMuPDFLoader
        params:
          output_format: markdown
      inputs: []
      stages:
      - stage_name: structured
        stage_kind: splitter
        component_type: RegexHierarchySplitter
        params:
          patterns:
          - - 1
            - ^\s*#\s+(.+)$
          - - 2
            - ^\s*##\s+(.+)$
          - - 3
            - ^\s*###\s+(.+)$
          - - 1
            - ^\s*\*\*(.+?)\*\*\s*$
          exclude_patterns:
          - ^\s*\d+\s*$
          include_parent_content: false
        input_aliases:
        - LOADING
        position: 0
      - stage_name: semantic
        stage_kind: splitter
        component_type: SemanticChunker
        params:
          embeddings: *id002
          threshold_type: fixed
          threshold: 0.8
          window_size: 4
        input_aliases:
        - structured
        position: 1
      indexing:
        index_type: chroma
        params:
          embeddings: *id002
          cleanup: true
          collection_name: 03_pdf_semantic
        collection_name: 03_pdf_semantic
    run_payload_template: {}
    retrievals:
    - name: vector
      source:
        kind: index
      create:
        retriever_type: create_vector_retriever
        params:
          top_k: 10
      requires_session: false
      queries:
      - name: morphology_vector
        query: Что такое морфология?
        top_k: 10
        strict_match: true
    - name: reranked
      source:
        kind: index
      create:
        retriever_type: create_reranking_retriever
        params:
          base_retriever_or_list:
            retriever_type: create_vector_retriever
            params:
              top_k: 10
          top_k: 3
          reranker_model: BAAI/bge-reranker-v2-m3
          max_score_ratio: 0.08
          device: cpu
      requires_session: false
      queries:
      - name: morphology_reranked
        query: Что такое морфология?
        top_k: 3
        strict_match: true
  expected_outcome: success
  notes: Pipeline-only API example parity with rag-lib.
- example_id: 04_pdf_raptor
  source_example_file: 04_pdf_raptor.py
  input_mode: file
  input_spec:
    file: Georgy Volkov ru.pdf
  runs:
  - run_name: main
    pipeline_create_payload:
      name: 04_pdf_raptor_pipeline
      loader:
        type: PDFLoader
        params:
          parse_mode: text
      inputs: []
      stages:
      - stage_name: sentences
        stage_kind: splitter
        component_type: SentenceSplitter
        params:
          chunk_size: 200
          chunk_overlap: 20
          language: auto
        input_aliases:
        - LOADING
        position: 0
      - stage_name: raptor_tree
        stage_kind: processor
        component_type: RaptorProcessor
        params:
          llm: *id001
          embeddings: *id002
          max_levels: 3
        input_aliases:
        - sentences
        position: 1
      indexing:
        index_type: chroma
        params:
          embeddings: *id002
          cleanup: true
          collection_name: 04_pdf_raptor
          dual_storage: true
          doc_store_path: ./data/docstore/04_pdf_raptor.pkl
        collection_name: 04_pdf_raptor
        docstore_name: 04_pdf_raptor_docstore
    run_payload_template: {}
    retrievals:
    - name: dual
      source:
        kind: index
      create:
        retriever_type: create_scored_dual_storage_retriever
        params:
          id_key: parent_id
          search_kwargs:
            k: 10
          search_type: similarity_score_threshold
          hydration_mode: children_enriched
      requires_session: false
      queries:
      - name: cio_europe
        query: CIO Europe
        top_k: 10
        strict_match: false
  expected_outcome: success
  notes: Pipeline-only API example parity with rag-lib.
- example_id: 05_docx_graph
  source_example_file: 05_docx_graph.py
  input_mode: file
  input_spec:
    file: Параметризованные задачи.docx
  runs:
  - run_name: main
    pipeline_create_payload:
      name: 05_docx_graph_pipeline
      loader:
        type: DocXLoader
        params: {}
      inputs: []
      stages:
      - stage_name: docx_structure
        stage_kind: splitter
        component_type: RegexHierarchySplitter
        params:
          patterns:
          - - 1
            - ^\s*#\s+(.+)$
          - - 2
            - ^\s*##\s+(.+)$
          - - 3
            - ^\s*###\s+(.+)$
          - - 4
            - ^\s*####\s+(.+)$
          exclude_patterns:
          - ^\s*$
          include_parent_content: false
        input_aliases:
        - LOADING
        position: 0
      - stage_name: graph_entities
        stage_kind: processor
        component_type: EntityExtractor
        params:
          llm: *id001
          store:
            object_type: NetworkXGraphStore
        input_aliases:
        - docx_structure
        position: 1
      indexing:
        index_type: chroma
        params:
          embeddings: *id002
          cleanup: true
          collection_name: 05_docx_graph
        collection_name: 05_docx_graph
    run_payload_template: {}
    retrievals:
    - name: graph_local
      source:
        kind: index
      create:
        retriever_type: GraphRetriever
        params:
          config:
            object_type: GraphQueryConfig
            mode: local
            max_hops: 1
            top_k_entities: 6
            top_k_relations: 8
            top_k_chunks: 6
            min_score: 0.55
            token_budget_entities: 450
            token_budget_relations: 650
            token_budget_chunks: 2400
            enable_keyword_extraction: true
            vector_relevance_mode: strict_0_1
      requires_session: false
      queries:
      - name: probability_theory_local
        query: Теория вероятности
        top_k: 10
        strict_match: false
      - name: probability_local
        query: вероятность
        top_k: 10
        strict_match: false
    - name: graph_mix
      source:
        kind: index
      create:
        retriever_type: GraphRetriever
        params:
          config:
            object_type: GraphQueryConfig
            mode: mix
            max_hops: 1
            top_k_entities: 6
            top_k_relations: 10
            top_k_chunks: 8
            min_score: 0.5
            token_budget_entities: 450
            token_budget_relations: 700
            token_budget_chunks: 2350
            enable_keyword_extraction: true
            vector_relevance_mode: strict_0_1
      requires_session: false
      queries:
      - name: probability_theory_mix
        query: Теория вероятности
        top_k: 10
        strict_match: false
      - name: probability_mix
        query: вероятность
        top_k: 10
        strict_match: false
    - name: graph_global
      source:
        kind: index
      create:
        retriever_type: GraphRetriever
        params:
          config:
            object_type: GraphQueryConfig
            mode: global
            max_hops: 1
            top_k_entities: 8
            top_k_relations: 12
            top_k_chunks: 6
            min_score: 0.45
            token_budget_entities: 600
            token_budget_relations: 1200
            token_budget_chunks: 1700
            enable_keyword_extraction: true
            vector_relevance_mode: strict_0_1
      requires_session: false
      queries:
      - name: probability_theory_global
        query: Теория вероятности
        top_k: 10
        strict_match: false
      - name: probability_global
        query: вероятность
        top_k: 10
        strict_match: false
    - name: graph_hybrid
      source:
        kind: index
      create:
        retriever_type: GraphRetriever
        params:
          config:
            object_type: GraphQueryConfig
            mode: hybrid
            max_hops: 1
            top_k_entities: 8
            top_k_relations: 10
            top_k_chunks: 7
            min_score: 0.5
            token_budget_entities: 550
            token_budget_relations: 900
            token_budget_chunks: 2000
            enable_keyword_extraction: true
            vector_relevance_mode: strict_0_1
      requires_session: false
      queries:
      - name: probability_theory_hybrid
        query: Теория вероятности
        top_k: 10
        strict_match: false
      - name: probability_hybrid
        query: вероятность
        top_k: 10
        strict_match: false
  expected_outcome: success
  notes: Pipeline-only API example parity with rag-lib.
- example_id: 06_docx_regex
  source_example_file: 06_docx_regex.py
  input_mode: file
  input_spec:
    file: KP_IT_IB_Strategy_Recalc_v7_AppC.docx
  runs:
  - run_name: main
    pipeline_create_payload:
      name: 06_docx_regex_pipeline
      loader:
        type: DocXLoader
        params: {}
      inputs: []
      stages:
      - stage_name: docx_regex
        stage_kind: splitter
        component_type: RegexSplitter
        params:
          pattern: (?m)(?=^(?:#\s+\d+\.\s+.+|##\s+\d+\.\d+\.\s+.+|###\s+Этап\s+(?:Э\d+|PA)\.\s+.+|\*\*(?:D\d+-\d+|PA-\d+)\.\s+.+\*\*|-\s+(?:D\d+-\d+|PA-\d+)\.\s+.+|\|\s*(?:D\d+-\d+|PA-\d+)\s*\|))
          chunk_size: 1200
          chunk_overlap: 0
        input_aliases:
        - LOADING
        position: 0
      indexing:
        index_type: chroma
        params:
          embeddings: *id002
          cleanup: true
          collection_name: 06_docx_regex
        collection_name: 06_docx_regex
    run_payload_template: {}
    retrievals:
    - name: regex
      source:
        kind: stage
        stage_name: docx_regex
      create:
        retriever_type: RegexRetriever
        params: {}
      requires_session: false
      queries:
      - name: scope_of_work
        query: Состав работ
        top_k: 5
        strict_match: true
      - name: team
        query: Команда
        top_k: 5
        strict_match: true
      - name: effort
        query: трудозатраты
        top_k: 5
        strict_match: true
      - name: phases
        query: этапы работ
        top_k: 5
        strict_match: true
      - name: cost
        query: Стоимость
        top_k: 5
        strict_match: true
      - name: goal
        query: Цель проекта
        top_k: 5
        strict_match: true
    - name: vector
      source:
        kind: index
      create:
        retriever_type: create_vector_retriever
        params:
          top_k: 5
      requires_session: false
      queries:
      - name: scope_of_work_vector
        query: Состав работ
        top_k: 5
        strict_match: true
      - name: team_vector
        query: Команда
        top_k: 5
        strict_match: true
      - name: effort_vector
        query: трудозатраты
        top_k: 5
        strict_match: true
      - name: phases_vector
        query: этапы работ
        top_k: 5
        strict_match: true
      - name: cost_vector
        query: Стоимость
        top_k: 5
        strict_match: true
      - name: goal_vector
        query: Цель проекта
        top_k: 5
        strict_match: true
  expected_outcome: success
  notes: Pipeline-only API example parity with rag-lib.
